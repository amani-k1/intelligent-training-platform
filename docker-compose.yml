services:

  # ── API GATEWAY ──────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - service-1
      - service-2
      - service-3-ia
      - service-5-chatbot

  # ── SERVICE 1 : Auth (Laravel) ───────────────────────────────────────
  service-1:
    build: ./backend/service-1
    container_name: service-1
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/service-1:/app
    depends_on:
      db:
        condition: service_healthy

  # ── SERVICE 2 : Métier (Laravel) ────────────────────────────────────
  service-2:
    build: ./backend/service-2
    container_name: service-2
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./backend/service-2:/app
    depends_on:
      db:
        condition: service_healthy

  # ── SERVICE 3 : IA Profilage (Flask + Random Forest) ────────────────
  service-3-ia:
    build: ./backend/service-3-ia
    container_name: service-3-ia
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend/service-3-ia:/app
    working_dir: /app
    command: python app.py

  # ── SERVICE 4 : Embedding SBERT (Flask) ─────────────────────────────
  service-4-embedding:
    build: ./backend/service-4-embedding
    container_name: service-4-embedding
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-useradmin}
    volumes:
      - ./backend/service-4-embedding:/app
    working_dir: /app
    command: python app.py
    depends_on:
      - db

  # ── SERVICE 5 : Chatbot RAG (FastAPI) ───────────────────────────────
  service-5-chatbot:
    build: ./backend/service-5-chatbot
    container_name: service-5-chatbot
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-ma_formation}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-useradmin}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend/service-5-chatbot:/app
      - chatbot_chroma:/app/chroma_db
    working_dir: /app
    command: uvicorn app:app --host 0.0.0.0 --port 8007
    depends_on:
      db:
        condition: service_healthy

  # ── BASE DE DONNÉES PostgreSQL 15 ───────────────────────────────────
  db:
    image: postgres:15
    container_name: db
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ma_formation}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-useradmin}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  chatbot_chroma:
