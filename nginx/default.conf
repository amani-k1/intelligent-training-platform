# Rate limiting : 10 req/min par IP sur les endpoints d'authentification
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;

    proxy_connect_timeout 120s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    resolver 127.0.0.11 valid=30s;

    # CORS dynamique : reflète l'origine réelle (fonctionne localhost ET prod)
    set $cors_origin $http_origin;
    if ($cors_origin = '') { set $cors_origin '*'; }

    # ── Macro CORS réutilisable via include ──────────────────────────────
    # (inline ici car nginx n'a pas de macro native)

    # ── AUTH SERVICE → service-1 ─────────────────────────────────────────
    location ~ ^/api/auth/(.*)$ {
        # Limite à 10 req/min, burst de 5 sans délai → 429 au-delà
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           1728000 always;
            return 204;
        }

        proxy_pass http://service-1:8000/api/$1$is_args$args;
        proxy_set_header Host            $host;
        proxy_set_header Authorization   $http_authorization;
        proxy_set_header X-Real-IP       $remote_addr;
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # ── INSCRIPTIONS → service-2 ─────────────────────────────────────────
    location ~ ^/api/inscriptions(.*)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           1728000 always;
            return 204;
        }

        proxy_pass http://service-2:8000/api/inscriptions$1$is_args$args;
        proxy_set_header Host          $host;
        proxy_set_header Authorization $http_authorization;
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # ── CHATBOT → service-5 (FastAPI RAG) ───────────────────────────────
    location ~ ^/api/chatbot/(.*)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           1728000 always;
            return 204;
        }

        proxy_pass http://service-5-chatbot:8007/$1$is_args$args;
        proxy_set_header Host              $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Real-IP         $remote_addr;
        # Streaming SSE support
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         300s;
        chunked_transfer_encoding  on;
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # ── IA → service-3-ia (CORRIGÉ: sans préfixe /api/) ─────────────────
    location ~ ^/api/ia/(.*)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           1728000 always;
            return 204;
        }

        # AVANT: /api/$1 → 404 car service-3 expose /predict pas /api/predict
        # APRÈS: /$1     → mappe /api/ia/predict → /predict sur service-3
        proxy_pass http://service-3-ia:5001/$1$is_args$args;
        proxy_set_header Host          $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP     $remote_addr;
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # ── APP (métier) → service-2 ─────────────────────────────────────────
    location ~ ^/api/app/(.*)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           1728000 always;
            return 204;
        }

        proxy_pass http://service-2:8000/api/$1$is_args$args;
        proxy_set_header Host          $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP     $remote_addr;
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # ── FALLBACK → service-1 ─────────────────────────────────────────────
    location ~ ^/api/(.*)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           1728000 always;
            return 204;
        }

        proxy_pass http://service-1:8000/api/$1$is_args$args;
        proxy_set_header Host              $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }
}
